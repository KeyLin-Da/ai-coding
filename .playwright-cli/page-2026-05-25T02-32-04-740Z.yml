                      - heading "4. performance（性能考量）" [level=2] [ref=e289]
                      - list [ref=e290]:
                        - listitem [ref=e291]:
                          - text: 保存校验只遍历当前子页面
                          - code [ref=e292]: templateList
                          - text: ，复杂度 O(n + m)，其中 n 为组件数、m 为菜单项数，m 最大 10，可忽略。
                        - listitem [ref=e293]:
                          - text: 用户端滚动选中态不应在滚动事件中频繁查询 DOM。建议前端在页面渲染和图片加载完成后缓存目标组件 offset，滚动时使用
                          - code [ref=e294]: requestAnimationFrame
                          - text: 或节流计算。
                        - listitem [ref=e295]: 定位菜单目标只允许菜单之后的组件，可以减少锚点集合规模；排序变更后前端立即重新计算目标选项。
                        - listitem [ref=e296]: 后端不新增 Redis key 和 MQ。缓存更新继续沿用保存后的装修页缓存刷新链路，避免额外一致性面。
                        - listitem [ref=e297]: 图片大小 200KB 主要由上传控件/DAM 上传前校验；后端如果只收到 URL，无法可靠获知文件大小，除非接入素材元数据查询。
                      - heading "5. concurrency（并发问题处理）" [level=2] [ref=e298]
                      - list [ref=e299]:
                        - listitem [ref=e300]: 微页保存延续现有“后提交覆盖先提交”的语义，不新增分布式锁。
                        - listitem [ref=e301]:
                          - text: 同一子页面两个运营同时编辑时，后提交请求会覆盖组件列表；后端唯一性校验仍可保证最终不会保存多个
                          - code [ref=e302]: locationMenu
                          - text: 。
                        - listitem [ref=e303]:
                          - text: 目标组件引用使用
                          - code [ref=e304]: targetComponentKey(itemId)
                          - text: 能降低首次保存时 DB id 未生成导致的并发/一致性问题。
                        - listitem [ref=e305]:
                          - text: 复制页面时必须重新生成页面内组件
                          - code [ref=e306]: itemId
                          - text: ，同时同步重写定位菜单
                          - code [ref=e307]: targetComponentKey
                          - text: ，避免跨页面锚点误指向原页面。
                        - listitem [ref=e308]: 删除或拖动目标组件到定位菜单之前时，前端应立即把对应菜单项标记为失效；后端保存兜底失败，避免脏配置进入发布态。
