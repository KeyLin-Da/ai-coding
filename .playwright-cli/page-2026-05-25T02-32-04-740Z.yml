                  - textbox [ref=e130]: "# 172014 技术方案评审：【opp】【装修】新增定位菜单组件 > 需求编号：172014 > OpenSpec 变更：`req-172014` > 输入文档：`docs/172014/prd/analysis.md` > 目标分支：`feature/opp-172014` > 执行分支：`master`（本地未找到目标分支，已记录为执行风险） > 产出时间：2026-05-21 ## 0. 探索结论 已按 `coding-design` 流程校验参数、创建 OpenSpec 变更目录，并执行 `openspec list --json` 与代码探索。`req-172014` 原本不存在，已初始化到 `openspec/changes/req-172014/`。 关键代码事实： - `MiniPageTemplateEnum` 当前没有 `locationMenu`，新增组件需要同步扩展共享 API 枚举，位置参考 `opp-api/opp-diy-api/src/main/java/com/infinitus/opp/diy/enums/MiniPageTemplateEnum.java:11`。 - 后台可用组件来自 `GET /v3/mini/page/config/all`，底层查询 `mini_page_template_classify where status = 1 order by sort`，参考 `opp-diy/src/main/java/com/infinitus/opp/diy/controller/MiniPageConfigController.java:90` 和 `opp-diy/src/main/java/com/infinitus/opp/diy/repository/MiniPageTemplateClassifyRepository.java:18`。 - 保存接口 `POST /v3/mini/page/config` 会把 `templateList` 转成 `MiniPageTemplateEntity` 后批量保存，并更新装修页缓存，参考 `opp-diy/src/main/java/com/infinitus/opp/diy/servicee/impl/MiniPageConfigServiceImpl.java:540`。 - 用户端 V3 详情走 `GET /v3/mini/page/config/details`，V4 装修详情走 `POST /api/v4/decoration/detail`；V4 对不认识的组件类型会直接过滤并记录“暂不支持”，参考 `opp-diy/src/main/java/com/infinitus/opp/diy/servicee/impl/DecorationConfigServiceImpl.java:117`。 - 工作区实际检索到的装修编辑器主要在 `opp-admin-news-vue/src/components/PageDesigner`，新增组件步骤写在 `PageDesigner/read.md:67`；`opp-admin-learn-vue` 未检索到 `/v3/mini/page/config/all` 相关自定义微页编辑器入口。实现前需确认本需求是否实际复用 `opp-admin-news-vue` 的 PageDesigner，或需要把组件能力同步到 `opp-admin-learn-vue`。 ## 1. 总体方案 采用“新增装修组件类型 + 复用现有微页组件存储”的方案，不新增业务表： 1. 组件类型统一为 `locationMenu`。 2. 后台编辑器新增定位菜单组件入口、画布预览、右侧配置面板和保存校验。 3. 后端在保存接口中增加 `locationMenu` 兜底校验，配置仍存入 `mini_page_template` 的现有 JSON 承载字段。 4. 用户端详情接口透传 V3 字段；V4 装修详情增加 `TemplateLocationMenu` 渲染 VO，避免组件被过滤。 5. 用户端渲染层根据 `locationMenu` 生成吸顶菜单，点击后滚动到当前子页面中位于定位菜单之后的目标组件。 建议数据结构使用 `imgUrl` 外层 `dispose` 兼容现有 V4 解析逻辑，同时保留 `json` 字段作为后续扩展，不把新字段拆到表列： ```json { \"type\": \"locationMenu\", \"imgUrl\": \"{\\\"dispose\\\":{\\\"style\\\":\\\"IMAGE_TEXT\\\",\\\"selectedTextColor\\\":\\\"#333333\\\",\\\"unselectedTextColor\\\":\\\"#999999\\\",\\\"selectedBackgroundColor\\\":\\\"#FFFFFF\\\",\\\"unselectedBackgroundColor\\\":\\\"#FFFFFF\\\",\\\"itemWidth\\\":64,\\\"itemHeight\\\":64,\\\"menus\\\":[{\\\"menuId\\\":\\\"lm_1\\\",\\\"title\\\":\\\"菜单名称\\\",\\\"selectedImageUrl\\\":\\\"https://.../selected.png\\\",\\\"unselectedImageUrl\\\":\\\"https://.../normal.png\\\",\\\"targetComponentId\\\":12345,\\\"targetComponentKey\\\":\\\"comp_xxx\\\",\\\"targetComponentType\\\":\\\"pictureBox\\\",\\\"targetComponentName\\\":\\\"图片1\\\",\\\"targetComponentSort\\\":4}]}}\" } ``` `targetComponentKey` 建议使用前端已有 `itemId`。PageDesigner 新增组件时已有唯一 `itemId` 机制，参考 `opp-admin-news-vue/src/components/PageDesigner/read.md:107`；这样可以解决新建页面首次保存时目标组件还没有 DB id 的问题。保存成功后可同时回写 `targetComponentId`，但目标合法性以同一次提交中的 `itemId/sort/type` 为准。 ## 2. api_scope（涉及接口范围） | 接口 | 方法 | 影响级别 | 变更点 | | --- | --- | --- | --- | | `/v3/mini/page/config/all` | GET | 中 | 可用组件列表返回 `locationMenu`，由 `mini_page_template_classify` 元数据驱动。 | | `/v3/mini/page/config` | POST | 高 | 保存微页时校验 `locationMenu` 唯一性、菜单项数量、样式必填、定位目标合法性，并保存配置。 | | `/v3/mini/page/config/{configId}` | GET | 中 | 后台编辑回显定位菜单完整配置；目标已失效时保留值并给前端标记不可用或返回空目标。 | | `/v3/mini/page/config/item/{configId}` | GET | 低 | 子页面列表返回逻辑不改，但每个子页面的定位菜单约束按当前 `configId` 生效。 | | `/v3/mini/page/config/details` | GET | 高 | 用户端 V3 详情透传 `locationMenu`；缓存刷新仍沿用 `updateRenovationCache`。 | | `/api/v4/decoration/detail` | POST | 高 | V4 转换链路新增 `TemplateLocationMenu`，否则新组件会被过滤。 | ### 保存流程 ```mermaid sequenceDiagram participant Admin as 后台装修编辑器 participant Diy as opp-diy participant Validator as LocationMenuValidator participant DB as mini_page_template participant Cache as 装修页缓存 Admin->>Diy: POST /v3/mini/page/config(templateList) Diy->>Validator: 校验 locationMenu 数量和配置 Validator->>Validator: 校验目标仅来自当前组件之后 Validator-->>Diy: 通过或抛 BizCheckException Diy->>DB: saveAll(templateList) Diy->>Cache: updateRenovationCache(config, templateList) Diy-->>Admin: MiniPageConfigClassVO ``` ### 用户端详情流程 ```mermaid sequenceDiagram participant Client as 小程序/H5 participant Diy as opp-diy participant Cache as 装修页缓存 participant Converter as V4转换器 Client->>Diy: GET /v3/mini/page/config/details 或 POST /api/v4/decoration/detail Diy->>Cache: 根据 code/configId 获取页面与子页面 Diy->>Diy: 过滤上下架、投放对象、人群包 alt V3详情 Diy-->>Client: templateList 含 locationMenu else V4详情 Diy->>Converter: 解析 dispose 为 TemplateLocationMenu Converter-->>Diy: TemplateArrangeVO Diy-->>Client: templateArrangeList 含 locationMenu end ``` ### 异常处理 - 同一子页面存在多个定位菜单：抛出 `BizCheckException(\"同一页面内最多添加一个定位菜单组件\")`。 - 必填字段为空：抛出 `BizCheckException(\"定位菜单组件配置项‘xxxx’不能为空\")`，建议后端只返回首个错误字段，前端保存前可批量提示。 - 菜单项数量小于 1 或大于 10：抛出明确数量错误。 - 目标组件不存在、排序不在定位菜单之后、目标在其他子页面：保存失败。 - V4 解析单个组件 JSON 异常：建议记录 `configId/templateId/type` 后抛业务异常；如要更强可用性，可改为过滤异常组件，但需要产品接受。 ## 3. sql_changes（SQL 改动内容） 不建议新增表或修改 `mini_page_template` 表结构。新增内容为组件元数据和可选校验 SQL。 ### 元数据初始化 `classify_id`、`sort` 需要以当前环境“基本组件”分类实际值为准，不能在设计阶段硬编码。上线 SQL 示例： ```sql -- 1. 查询基础组件分类下现有组件，确认 classify_id 和 sort SELECT classify_id, type, remark, sort FROM mini_page_template_classify WHERE status = 1 ORDER BY classify_id, sort; -- 2. 如不存在 locationMenu，则插入 INSERT INTO mini_page_template_classify (classify_id, type, status, remark, sort, created_time) SELECT :basic_classify_id, 'locationMenu', 1, '定位菜单', :sort, NOW() WHERE NOT EXISTS ( SELECT 1 FROM mini_page_template_classify WHERE classify_id = :basic_classify_id AND type = 'locationMenu' ); ``` ### ER 关系 ```mermaid erDiagram mini_page_config ||--o{ mini_page_template : \"config_id\" mini_page_template }o--|| mini_page_template_classify : \"classify_id\" mini_page_template { string type \"locationMenu\" string img_url \"承载定位菜单配置\" string json \"扩展字段\" } ``` ### 数据库查询说明 本次未使用 `coding-database-query` 查询真实库，因为工作区未提供只读数据源配置。表结构判断来自实体、Repository 和现有 SQL 注解。实现前如需定稿上线 SQL，应使用只读账号确认 `mini_page_template_classify` 的基础组件 `classify_id` 与排序区间。 ## 4. performance（性能考量） - 保存校验只遍历当前子页面 `templateList`，复杂度 O(n + m)，其中 n 为组件数、m 为菜单项数，m 最大 10，可忽略。 - 用户端滚动选中态不应在滚动事件中频繁查询 DOM。建议前端在页面渲染和图片加载完成后缓存目标组件 offset，滚动时使用 `requestAnimationFrame` 或节流计算。 - 定位菜单目标只允许菜单之后的组件，可以减少锚点集合规模；排序变更后前端立即重新计算目标选项。 - 后端不新增 Redis key 和 MQ。缓存更新继续沿用保存后的装修页缓存刷新链路，避免额外一致性面。 - 图片大小 200KB 主要由上传控件/DAM 上传前校验；后端如果只收到 URL，无法可靠获知文件大小，除非接入素材元数据查询。 ## 5. concurrency（并发问题处理） - 微页保存延续现有“后提交覆盖先提交”的语义，不新增分布式锁。 - 同一子页面两个运营同时编辑时，后提交请求会覆盖组件列表；后端唯一性校验仍可保证最终不会保存多个 `locationMenu`。 - 目标组件引用使用 `targetComponentKey(itemId)` 能降低首次保存时 DB id 未生成导致的并发/一致性问题。 - 复制页面时必须重新生成页面内组件 `itemId`，同时同步重写定位菜单 `targetComponentKey`，避免跨页面锚点误指向原页面。 - 删除或拖动目标组件到定位菜单之前时，前端应立即把对应菜单项标记为失效；后端保存兜底失败，避免脏配置进入发布态。 ## 6. impact_analysis（影响范围评估） ### 后台前端 PRD 标注后台工程为 `opp-admin-learn-vue`，但当前工作区检索到完整自定义微页装修编辑器在 `opp-admin-news-vue/src/components/PageDesigner` 和旧 `microEditor`。需要在实现前确认实际落点： - 若新平衡生活+使用 PageDesigner：新增 `location-menu.vue` 的预览组件、配置组件、默认 dispose、组件入口和图标。 - 若需求确实落在 `opp-admin-learn-vue`：需先确认装修编辑器来源，或把 PageDesigner 组件能力迁移/复用过去。 前端需覆盖： - 基础组件区展示“定位菜单”。 - 拖拽唯一性拦截和 toast。 - 三种样式切换和实时预览。 - 菜单项 1-10 个增删。 - 图片上传 jpg/jpeg/png、最大 200KB。 - 标题最多 8 字。 - 定位目标只展示当前子页面中排序在定位菜单之后的组件，同类型展示“类型名+序号”。 - 用户端吸顶、滚动选中、点击定位。 ### 后端 `opp-diy` - `MiniPageConfigServiceImpl.save` 保存前增加 `locationMenu` 校验。 - `MiniPageTemplateClassify` 元数据返回新增类型。 - `getRenovationPageDetailsV2` 与缓存刷新无需新增接口，但要保证新字段完整透传。 - `DecorationConfigServiceImpl` 和共享 VO 需支持 V4 渲染转换。 ### 共享 API `opp-api/opp-diy-api` - 新增 `MiniPageTemplateEnum.LOCATION_MENU(\"locationMenu\", 0)`。 - 新增 `TemplateLocationMenu extends RenderingBase`。 - `RenderingBase` 的 `JsonSubTypes` 增加 `TemplateLocationMenu`。 - `RenderingOldEnum` 增加 `LOCATIONMENU(\"locationMenu\", \"定位菜单\", null, TemplateLocationMenu.class)`。 ### 风险等级 综合风险：中高。主要风险不是表结构，而是多端编辑器、V3/V4 详情、用户端滚动定位之间的契约一致性。 ## 7. unit_test（单元测试设计） ### 后端单元测试 | 测试类 | 方法 | 覆盖场景 | Mock | 预期 | | --- | --- | --- | --- | --- | | `LocationMenuValidatorTest` | `validate_success_imageText` | 图文样式、2 个菜单、目标在后方 | 无 | 校验通过 | | `LocationMenuValidatorTest` | `validate_fail_duplicate` | 同一 templateList 两个定位菜单 | 无 | 指定唯一性异常 | | `LocationMenuValidatorTest` | `validate_fail_targetBeforeMenu` | 目标排序小于等于定位菜单 | 无 | 定位目标异常 | | `LocationMenuValidatorTest` | `validate_fail_menuCount` | 0 个、11 个菜单 | 无 | 数量异常 | | `LocationMenuValidatorTest` | `validate_fail_requiredByStyle` | 纯文字缺标题/目标，纯图片缺图片/宽高 | 无 | 必填字段异常 | | `DecorationConfigServiceImplTest` | `convert_locationMenu_success` | V4 解析 `locationMenu` | Mock `MiniPageConfigService` | 返回 `TemplateArrangeVO` | | `MiniPageConfigServiceImplTest` | `save_refreshCacheWithLocationMenu` | 保存后刷新装修页缓存 | Mock Repository/TreeService | `templateList` 含新组件 | ### 前端测试/验证 - `PageDesigner/config/components.js`：组件入口按渠道/页面类型显示。 - `location-menu` 配置组件：样式切换、菜单项增删、字段必填、图片限制、标题长度。 - 画布预览组件：三种样式、选中态/未选中态、空图片占位。 - 目标下拉：拖动排序、删除目标、同类型序号显示。 - 用户端渲染：点击定位、吸顶、滚动选中、目标缺失降级。 ## 8. 待确认与阻塞 1. 本地无 `feature/opp-172014` 分支，当前产物写在 `master` 工作树。 2. PRD 指向 `opp-admin-learn-vue`，但代码探索显示自定义微页编辑器主要在 `opp-admin-news-vue`；实现前必须确认前端实际工程。 3. 新平衡生活+ 的 `miniAppType=6` 已在 V4 Query 注释中出现，但 `TenantCodeEnum` 当前只包含 `JMEETING/JNEWS/JLEARN/JTEST`；用户端详情的 `tenantCode` 映射需确认。 4. 纯图片样式下标题是否必填、图片宽高默认值和范围、滚动偏移是否扣除顶部导航高度，仍需产品/视觉确认。 5. 后端无法仅凭 URL 校验图片 200KB，需要明确是否接 DAM 元数据或仅由上传控件保证。"
