                  - generic [ref=e187]:
                    - textbox [ref=e190]: "## Why 后台学习数据接口 `/api/v2/activityInfo/getClockData` 在大活动下会把 `fun_clock_info`、`fun_activity_data`、`fun_activity_calendar` 明细全量加载到 JVM，只为计算报名数、打卡数和打卡率，已引发 `opp-learn` 严重 FullGC 风险。该接口仍被管理后台调用，即使标记为废弃，也需要先做低风险性能修复。 ## What Changes - 将 `getClockData` 汇总计算从全量 `list()` 改为数据库侧 `count` / 聚合查询。 - 聚合和分页 SQL 使用 `opp-learn` 现有 MyBatis/MyBatis-Plus Mapper/XML 写法，不为本接口新增 JDBC Template 写法。 - 保持现有接口路径、入参、出参和打卡率口径不变。 - 优化打卡统计分页查询，避免不必要的大范围扫描。 - 补充必要索引建议和执行计划验收要求。 ## Non-goals - 不重构前端调用链或删除废弃接口。 - 不调整 `getFunUserData`，该接口性能优化另行处理。 - 不改变打卡率、报名人数、打卡次数的业务含义。 - 不引入缓存、汇总表或异步统计链路。 ## Capabilities ### New Capabilities - `learn-activity-clock-data-performance`: 约束学习活动打卡统计接口在大活动下的汇总和分页查询性能。 ### Modified Capabilities - 无。 ## Impact 影响 `opp-learn` 的 `FunActivityController#getClockData`、`IFunActivityDataService` / `FunActivityDataMapper` 聚合查询，以及 `fun_clock_info`、`fun_activity_data`、`fun_activity_calendar` 相关索引评估。`opp-admin-bff` 和 `opp-api` 的 Feign/API 合约保持不变。验证需覆盖 TEAM、COMMUNITY、CLOCK 三类活动，并确认大活动下不再触发全量明细装载。 ## Success Criteria - `getClockData` 不再执行无分页的明细 `list()` 查询来计算汇总值。 - `EXPLAIN` 显示核心聚合查询命中以 `activity_id` 起手的合适索引。 - 典型大活动下接口不再触发 FullGC，P95 响应耗时明显下降。 - 返回字段与现有接口语义保持一致。"
