                - generic [ref=e940]:
                  - textbox [ref=e943]: "## Why 新平衡生活+ 自定义微页需要新增“定位菜单”组件，用于长页面内快速跳转到后续组件，提升非首屏内容曝光。现有装修组件体系没有 `locationMenu` 类型，后台编辑器、后端保存校验、详情回显和用户端 V4 渲染链路都无法识别该组件。 ## What Changes - 新增装修组件类型 `locationMenu`，并在共享枚举、组件元数据、后台编辑器和用户端渲染链路中统一识别。 - 后台编辑器支持定位菜单拖拽、唯一性拦截、三种样式配置、菜单项 1-10 个配置、目标组件下拉和画布预览。 - 后端保存接口对 `locationMenu` 做唯一性、数量、必填、图片字段和目标合法性兜底校验。 - V3/V4 装修详情返回定位菜单配置；V4 新增 `TemplateLocationMenu`，避免新组件被过滤。 - 不新增业务表，沿用 `mini_page_template` 现有 JSON 承载方式。 ## Non-goals - 不调整微页上下架、投放对象、人群包、分享、主题和二维码逻辑。 - 不新增 Redis/MQ/分布式锁。 - 不做历史微页数据迁移；旧页面没有定位菜单时保持原样。 - 不改造定位菜单目标之外的组件交互。 ## Capabilities ### New Capabilities - `location-menu-component`: 支持自定义微页定位菜单组件的配置、保存、回显和用户端渲染。 ### Modified Capabilities - 微页装修组件管理：新增 `locationMenu` 类型。 - 自定义装修 V4 详情：新增 `locationMenu` 渲染转换。 ## Impact - 前端：`opp-admin-learn-vue` 需确认真实装修编辑器位置；当前工作区检索到的主要实现点在 `opp-admin-news-vue/src/components/PageDesigner`。 - 后端：`opp-diy` 的保存、详情、缓存刷新和 V4 转换链路。 - 共享 API：`opp-api/opp-diy-api` 的枚举和 VO。 - 数据库：仅新增 `mini_page_template_classify` 元数据，无 DDL。"
