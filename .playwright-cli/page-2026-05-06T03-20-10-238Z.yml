              - paragraph [ref=f1e864]: 9、作业内容（文本）：上报该活动用户对应登录账号成功发布课后作业的文案；文本显示3行，超过3行显示…；鼠标放置文本上，显示全部字段，鼠标移开则隐藏；样式详见下方示意图
              - paragraph [ref=f1e865]: 10、作业内容（图片）：上报该活动用户对应登录账号成功发布课后作业的图片；显示首张图片，右上角显示照片数量；点击【详情】显示全部图片；如无上传图片显示/，且不显示照片数量和「详情」按钮，样式详见下方示意图
              - paragraph [ref=f1e866]: 11、作业内容（视频）：上报该活动用户对应登录账号成功发布课后作业的视频，点击视频，则弹出弹窗自动播放视频；如无上传视频显示/，样式详见下方示意图
